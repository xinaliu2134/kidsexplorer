<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Holland Kids Explorer · 荷兰亲子地图</title>
<meta name="description" content="670+ family-friendly venues across the Netherlands on one interactive map. Bilingual. Free.">
<link rel="canonical" href="https://kidsexplorer.eu/nl-v2/">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Original Holland Kids palette (restored from v1) */
  --bg:#F2F4F8;
  --surface:#FFFFFF;
  --border:#CBD5E1;
  --border-strong:#94A3B8;
  --text:#1A2B4A;
  --text-soft:#5A6A84;
  --text-mute:#9AA5B8;
  --brand:#E05A1E;
  --brand-dark:#B84515;
  --brand-light:#FFF0E9;
  --teal:#0EA5A0;
  --navy:#1A2B4A;
  --shadow:0 1px 3px rgba(26,43,74,.12), 0 0 0 1px rgba(26,43,74,.04);
  --shadow-lg:0 8px 24px rgba(26,43,74,.20), 0 0 0 1px rgba(26,43,74,.08);
  --radius:14px;
  --header-h:56px;
  --safe-bottom:env(safe-area-inset-bottom,0);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input{font-family:inherit;border:none;outline:none;background:none;color:inherit}

/* ===== Top Header ===== */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:rgba(255,255,255,.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);z-index:900;display:flex;align-items:center;gap:10px;padding:0 14px}
.hdr-brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;letter-spacing:-.3px;color:var(--brand);white-space:nowrap}
.hdr-brand .logo{font-size:20px}
.hdr-country{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--bg);border:1px solid var(--border);border-radius:999px;font-size:13px;font-weight:600;cursor:pointer}
.hdr-country:hover{border-color:var(--brand)}
.hdr-country .flag{font-size:16px}
.hdr-search{flex:1;display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--bg);border:1px solid var(--border);border-radius:999px;cursor:text;min-width:0}
.hdr-search input{flex:1;font-size:14px;min-width:0}
.hdr-search .icon{color:var(--text-mute);flex-shrink:0}
.hdr-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg);border:1px solid var(--border);font-size:16px;flex-shrink:0}
.hdr-btn:hover{border-color:var(--brand);color:var(--brand)}

/* ===== Map ===== */
#map{position:fixed;top:var(--header-h);left:0;right:0;bottom:0;z-index:1}
.leaflet-popup-content-wrapper{border-radius:14px}
.leaflet-popup-content{margin:14px 16px;font-family:'Inter',sans-serif;font-size:13px}

/* ===== Map/List Toggle (mobile) ===== */
.view-toggle{position:fixed;left:50%;transform:translateX(-50%);top:calc(var(--header-h) + 12px);z-index:600;display:flex;background:#fff;border:1px solid var(--border);border-radius:999px;box-shadow:var(--shadow);padding:3px}
.view-toggle button{padding:8px 18px;font-size:13px;font-weight:600;border-radius:999px;color:var(--text-soft)}
.view-toggle button.active{background:var(--text);color:#fff}
.view-toggle button:not(.active):hover{color:var(--text)}
body[data-view="list"] #map{display:none}
body[data-view="list"] .drawer{transform:translateY(0)!important;top:calc(var(--header-h) + 58px);border-radius:20px 20px 0 0;max-height:calc(100vh - var(--header-h) - 58px);height:calc(100vh - var(--header-h) - 58px)}
body[data-view="list"] .drawer-handle{display:none}
body[data-view="list"] .fab-stack{display:none}
@media (min-width:1024px){
  .view-toggle{display:none} /* desktop shows both */
}

/* ===== Floating Action Buttons ===== */
.fab-stack{position:fixed;right:14px;top:calc(var(--header-h) + 14px);z-index:500;display:flex;flex-direction:column;gap:10px}
.fab{width:44px;height:44px;border-radius:50%;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s}
.fab:hover{border-color:var(--brand);color:var(--brand);transform:scale(1.05)}
.fab.near{background:var(--brand);color:#fff;border-color:var(--brand);width:auto;padding:0 18px;border-radius:22px;font-size:13px;font-weight:600;gap:6px}
.fab.near:hover{background:var(--brand-dark);color:#fff}

/* ===== Bottom Drawer (List) ===== */
.drawer{position:fixed;left:0;right:0;bottom:0;z-index:700;background:#fff;border-top:1px solid var(--border);border-radius:20px 20px 0 0;box-shadow:var(--shadow-lg);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:80vh;display:flex;flex-direction:column}
.drawer[data-state="peek"]{transform:translateY(calc(100% - 72px))}
.drawer[data-state="half"]{transform:translateY(calc(100% - 48vh))}
.drawer[data-state="full"]{transform:translateY(8vh)}
.drawer-handle{flex-shrink:0;padding:8px 0 4px;text-align:center;cursor:grab;touch-action:none}
.drawer-handle::before{content:'';display:inline-block;width:40px;height:4px;background:var(--border-strong);border-radius:2px}
.drawer-hdr{flex-shrink:0;padding:6px 18px 12px;display:flex;align-items:center;justify-content:space-between}
.drawer-hdr .count{font-weight:700;font-size:14px}
.drawer-hdr .count small{font-weight:500;color:var(--text-mute);font-size:12px;margin-left:4px}
.drawer-hdr .actions{display:flex;gap:6px}
.drawer-hdr .chip{padding:6px 12px;border-radius:999px;background:var(--bg);border:1px solid var(--border);font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px}
.drawer-hdr .chip:hover{border-color:var(--brand);color:var(--brand)}
.drawer-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 18px calc(20px + var(--safe-bottom))}
.venue-card{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer}
.venue-card:last-child{border-bottom:none}
.venue-card:hover{background:#fafaf7}
.venue-card:hover .venue-name{color:var(--brand)}
.venue-thumb{width:56px;height:56px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;position:relative;overflow:hidden}
.venue-thumb::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent)}
.venue-info{flex:1;min-width:0}
.venue-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.venue-zh{font-size:12px;color:var(--text-mute);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.venue-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-soft)}
.venue-meta .rating{color:var(--brand);font-weight:600}
.venue-meta .dot{color:var(--text-mute)}
.empty{padding:40px 20px;text-align:center;color:var(--text-mute);font-size:14px}

/* ===== Detail Overlay (bottom sheet, half-screen) ===== */
.overlay{position:fixed;left:0;right:0;bottom:0;z-index:900;background:#fff;border-top:1px solid var(--border);border-radius:20px 20px 0 0;box-shadow:var(--shadow-lg);max-height:50vh;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.overlay.open{transform:translateY(0)}
.overlay-hdr{flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;padding:18px 18px 12px;gap:10px}
.overlay-title{flex:1;min-width:0}
.overlay-title h3{font-size:18px;font-weight:700;line-height:1.2;margin-bottom:4px}
.overlay-title .zh{font-size:13px;color:var(--text-mute)}
.overlay-close{width:32px;height:32px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-soft)}
.overlay-body{flex:1;overflow-y:auto;padding:0 18px 20px}
.detail-row{display:flex;gap:10px;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border);color:var(--text-soft)}
.detail-row .lbl{min-width:70px;font-weight:600;color:var(--text)}
.overlay-actions{flex-shrink:0;padding:12px 18px calc(12px + var(--safe-bottom));border-top:1px solid var(--border);display:flex;gap:8px}
.overlay-actions .btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;text-align:center;display:flex;align-items:center;justify-content:center;gap:6px}
.overlay-actions .btn-primary{background:var(--brand);color:#fff}
.overlay-actions .btn-primary:hover{background:var(--brand-dark)}
.overlay-actions .btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.overlay-actions .btn-secondary:hover{border-color:var(--brand);color:var(--brand)}
.overlay-fav{width:44px;height:44px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;transition:all .15s}
.overlay-fav:hover{border-color:var(--brand)}
.overlay-fav.on{color:var(--brand);background:#fff5f0;border-color:var(--brand)}
.card-fav{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.9);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text-mute);z-index:2;transition:all .15s}
.card-fav:hover{color:var(--brand);border-color:var(--brand)}
.card-fav.on{color:var(--brand);background:#fff5f0;border-color:var(--brand)}
.venue-thumb{position:relative}

/* ===== Filter Drawer (slides from right) ===== */
.filter-drawer{position:fixed;top:var(--header-h);right:0;bottom:0;width:min(360px,92vw);background:#fff;border-left:1px solid var(--border);box-shadow:-10px 0 40px rgba(0,0,0,.12);z-index:950;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;pointer-events:none}
.filter-drawer.open{pointer-events:auto}
.filter-drawer.open{transform:translateX(0)}
.filter-hdr{flex-shrink:0;padding:20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.filter-hdr h3{font-size:18px;font-weight:700}
.filter-body{flex:1;overflow-y:auto;padding:20px}
.filter-section{margin-bottom:24px}
.filter-section h4{font-size:12px;font-weight:600;color:var(--text-mute);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.cat-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:500;color:var(--text)}
.cat-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.cat-btn:not(.active):hover{border-color:var(--brand);color:var(--brand)}
.cat-btn .emoji{font-size:16px}
.cat-btn .count{margin-left:auto;font-size:11px;opacity:.75}
.filter-footer{flex-shrink:0;padding:16px 20px calc(16px + var(--safe-bottom));border-top:1px solid var(--border);display:flex;gap:10px}
.filter-footer .btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600}
.filter-footer .btn-clear{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.filter-footer .btn-apply{background:var(--brand);color:#fff}

/* Gradient covers for thumbnails */
.cat-theme_park{background:linear-gradient(135deg,#ff9a56,#ff6b9d)}
.cat-zoo{background:linear-gradient(135deg,#22c55e,#059669)}
.cat-aquarium{background:linear-gradient(135deg,#06b6d4,#0369a1)}
.cat-museum{background:linear-gradient(135deg,#8b5cf6,#4f46e5)}
.cat-nature{background:linear-gradient(135deg,#84cc16,#15803d)}
.cat-beach{background:linear-gradient(135deg,#38bdf8,#0ea5e9)}
.cat-playground{background:linear-gradient(135deg,#fbbf24,#f97316)}
.cat-indoor_play{background:linear-gradient(135deg,#a855f7,#7e22ce)}
.cat-trampoline{background:linear-gradient(135deg,#ec4899,#be185d)}
.cat-swim{background:linear-gradient(135deg,#06b6d4,#0369a1)}
.cat-climbing{background:linear-gradient(135deg,#f59e0b,#b45309)}
.cat-karting{background:linear-gradient(135deg,#ef4444,#991b1b)}
.cat-farm{background:linear-gradient(135deg,#a3e635,#65a30d)}
.cat-attraction{background:linear-gradient(135deg,#fb923c,#c2410c)}
.cat-theatre{background:linear-gradient(135deg,#d946ef,#86198f)}
.cat-cinema{background:linear-gradient(135deg,#64748b,#334155)}
.cat-ice_rink{background:linear-gradient(135deg,#60a5fa,#1d4ed8)}
.cat-minigolf{background:linear-gradient(135deg,#10b981,#047857)}
.cat-other{background:linear-gradient(135deg,#94a3b8,#475569)}
.cat-castle{background:linear-gradient(135deg,#a78bfa,#6d28d9)}
.cat-windmill{background:linear-gradient(135deg,#bae6fd,#0284c7)}
.cat-escape{background:linear-gradient(135deg,#fdba74,#c2410c)}
.cat-sports{background:linear-gradient(135deg,#fde047,#ca8a04)}
.cat-restaurant{background:linear-gradient(135deg,#f87171,#b91c1c)}
.cat-monument{background:linear-gradient(135deg,#d6d3d1,#57534e)}
.cat-ship{background:linear-gradient(135deg,#67e8f9,#0e7490)}
.cat-ruins{background:linear-gradient(135deg,#fde68a,#92400e)}

/* Marker icons */
.venue-marker{width:36px;height:36px;border-radius:50%;background:#fff;border:3px solid;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.leaflet-marker-icon.selected .venue-marker{transform:scale(1.2);border-width:4px}

/* Cluster */
.marker-cluster-small{background:rgba(201,100,66,.25)}
.marker-cluster-small div{background:rgba(201,100,66,.8)}
.marker-cluster-medium{background:rgba(201,100,66,.35)}
.marker-cluster-medium div{background:rgba(201,100,66,.9)}
.marker-cluster-large{background:rgba(201,100,66,.45)}
.marker-cluster-large div{background:var(--brand)}
.marker-cluster div{color:#fff;font-weight:700}

@media (max-width:640px){
  .hdr-brand span:not(.logo){display:none}
  .drawer-hdr{padding:6px 14px 10px}
  .drawer-body{padding:0 14px calc(20px + var(--safe-bottom))}
  .cat-grid{grid-template-columns:1fr}
}
@media (min-width:1024px){
  /* Desktop: drawer becomes sidebar */
  .drawer{top:var(--header-h);right:auto;left:0;width:420px;max-width:420px;max-height:none;height:calc(100vh - var(--header-h));border-radius:0;border-right:1px solid var(--border);border-top:none;transform:translateX(0) !important;box-shadow:4px 0 24px rgba(0,0,0,.06)}
  .drawer-handle{display:none}
  #map{left:420px}
  .overlay{left:auto;right:20px;bottom:20px;width:400px;max-width:calc(100vw - 440px);max-height:70vh;border-radius:20px;border:1px solid var(--border)}
  .fab-stack{top:calc(var(--header-h) + 14px);right:14px}
}
</style>
</head>
<body>

<!-- Top Header -->
<header class="hdr">
  <a href="/" class="hdr-brand"><span class="logo">🌍</span><span>KidsExplorer</span></a>
  <button class="hdr-country" onclick="openCountryPicker()">
    <span class="flag">🇳🇱</span><span>NL</span><span style="opacity:.5">▾</span>
  </button>
  <div class="hdr-search">
    <span class="icon">🔍</span>
    <input id="search" placeholder="Search / 搜索…">
  </div>
  <button class="hdr-btn" id="lang-btn" onclick="toggleLang()" title="Language">中</button>
  <button class="hdr-btn" onclick="openFilter()" title="Category">⚙️</button>
</header>

<!-- Map -->
<div id="map"></div>

<!-- View Toggle (mobile only) -->
<div class="view-toggle">
  <button id="tog-map" class="active" onclick="setView('map')">🗺 Map</button>
  <button id="tog-list" onclick="setView('list')">☰ List</button>
</div>

<!-- Floating Actions -->
<div class="fab-stack">
  <button class="fab near" onclick="locateMe()"><span>📍</span><span>Near me</span></button>
  <button class="fab" onclick="zoomIn()">+</button>
  <button class="fab" onclick="zoomOut()">−</button>
</div>

<!-- Bottom Drawer: Venue list -->
<section class="drawer" id="drawer" data-state="peek">
  <div class="drawer-handle" onclick="toggleDrawer()"></div>
  <div class="drawer-hdr">
    <div class="count"><span id="count">0</span> <small id="count-label">in view</small></div>
    <div class="actions">
      <button class="chip" id="favs-chip" onclick="toggleFavsOnly()">♡ Favs</button>
      <button class="chip" onclick="openFilter()">⚙ Category</button>
      <button class="chip" onclick="toggleSort()">↕ Sort</button>
    </div>
  </div>
  <div class="drawer-body" id="list"></div>
</section>

<!-- Detail Overlay -->
<aside class="overlay" id="overlay">
  <div class="overlay-hdr">
    <div class="overlay-title">
      <h3 id="ov-name"></h3>
      <div class="zh" id="ov-zh"></div>
    </div>
    <button class="overlay-close" onclick="closeOverlay()">×</button>
  </div>
  <div class="overlay-body" id="ov-body"></div>
  <div class="overlay-actions">
    <button class="overlay-fav" id="ov-fav" onclick="toggleFav()" title="Save to favorites">♡</button>
    <a class="btn btn-secondary" id="ov-directions" target="_blank">🗺 Directions</a>
    <a class="btn btn-primary" id="ov-website" target="_blank">🌐 Website</a>
  </div>
</aside>

<!-- Filter Drawer -->
<aside class="filter-drawer" id="filter">
  <div class="filter-hdr">
    <h3>Category</h3>
    <button class="overlay-close" onclick="closeFilter()">×</button>
  </div>
  <div class="filter-body">
    <div class="filter-section">
      <h4>Category</h4>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
  </div>
  <div class="filter-footer">
    <button class="btn btn-clear" onclick="clearFilter()">Clear</button>
    <button class="btn btn-apply" onclick="closeFilter()">Show results</button>
  </div>
</aside>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>

// Richer emoji mapping using venue name keywords
function emojiFor(name, cat){
  const n = (name||'').toLowerCase();
  // Zoo subtype refinements
  if(cat==='zoo'){
    if(/safari|wild|beekse/.test(n)) return '🦁';
    if(/dolf|sea|seal|marine/.test(n)) return '🐬';
    if(/bird|vogel|avifauna/.test(n)) return '🦜';
    if(/ape|monkey|apen/.test(n)) return '🐒';
    if(/butterfly|vlinder/.test(n)) return '🦋';
    if(/reptile|snake|slang/.test(n)) return '🐍';
    return '🦒';
  }
  // Museum subtype
  if(cat==='museum'){
    if(/science|nemo|natur/.test(n)) return '🔬';
    if(/art|van gogh|rijks|kunstmuseum|stedelijk|gemeente/.test(n)) return '🖼️';
    if(/maritime|ship|scheepvaart|maritiem/.test(n)) return '⚓';
    if(/railway|spoorweg|train|tram/.test(n)) return '🚂';
    if(/aviation|air|luchtvaart/.test(n)) return '✈️';
    if(/corpus|body|anatomie/.test(n)) return '🫀';
    if(/music|muziek|instrument/.test(n)) return '🎼';
    if(/toy|speelgoed/.test(n)) return '🧸';
    if(/history|histori|oorlog|war|museum van de geest/.test(n)) return '📜';
    return '🏛️';
  }
  // Theme park subtype
  if(cat==='theme_park'){
    if(/water|waterpark|splash|aqua/.test(n)) return '💦';
    if(/snow|ski|slope/.test(n)) return '❄️';
    if(/mini|madurodam|miniatuur/.test(n)) return '🏘️';
    if(/fairy|sprookje|efteling/.test(n)) return '🏰';
    return '🎢';
  }
  // Nature subtype
  if(cat==='nature'){
    if(/forest|bos|wald/.test(n)) return '🌲';
    if(/heath|heide/.test(n)) return '🌾';
    if(/dune|duin/.test(n)) return '🏝️';
    if(/lake|meer|lak/.test(n)) return '🏞️';
    if(/tulip|tulp|keukenhof/.test(n)) return '🌷';
    return '🌳';
  }
  // Playground subtype
  if(cat==='playground'){
    if(/water|splash/.test(n)) return '💦';
    if(/adventure|avontur/.test(n)) return '🧗';
    return '🛝';
  }
  // Indoor play
  if(cat==='indoor_play'){
    if(/monkey/.test(n)) return '🐒';
    if(/ballorig|ball/.test(n)) return '🎈';
    if(/jimmy|jimmi/.test(n)) return '🤹';
    return '🏠';
  }
  // Restaurant subtype
  if(cat==='restaurant'){
    if(/pannenkoek|pancake/.test(n)) return '🥞';
    if(/chinese|chinees|china|asia|asian|sushi|wok/.test(n)) return '🥢';
    if(/pizza|pizzer/.test(n)) return '🍕';
    if(/ice cream|ijssalon|gelato/.test(n)) return '🍦';
    if(/buffet/.test(n)) return '🍱';
    if(/burger|mcdonalds/.test(n)) return '🍔';
    return '🍽️';
  }
  // Theme parks extras
  if(cat==='theme_park' && /petting|boerderij/.test(n)) return '🐄';
  // Castle/fort
  if(cat==='castle'){
    if(/fort|bourtange/.test(n)) return '⚔️';
    return '🏰';
  }
  // Windmill
  if(cat==='windmill') return '🌬️';
  // Sports
  if(cat==='sports'){
    if(/klim|climb/.test(n)) return '🧗';
    if(/bow|boog/.test(n)) return '🏹';
    return '🏆';
  }
  // Farm animals
  if(cat==='farm'){
    if(/geiten|goat/.test(n)) return '🐐';
    if(/paarden|horse/.test(n)) return '🐴';
    return '🐑';
  }
  return CATS[cat]?.emoji || '📍';
}

function classify(t){
  if(t.tourism==='theme_park') return 'theme_park';
  if(t.tourism==='zoo') return 'zoo';
  if(t.tourism==='children_farm') return 'farm';
  if(t.tourism==='aquarium') return 'aquarium';
  if(t.tourism==='museum') return 'museum';
  if(t.tourism==='attraction' || t.tourism==='visitor_centre') return 'attraction';
  if(t.leisure==='nature_reserve' || t.leisure==='park') return 'nature';
  if(t.leisure==='playground') return 'playground';
  if(t.leisure==='indoor_playground') return 'indoor_play';
  if(t.leisure==='trampoline_park') return 'trampoline';
  if(t.leisure==='swimming_pool') return 'swim';
  if(t.leisure==='climbing_park') return 'climbing';
  if(t.leisure==='go_kart') return 'karting';
  if(t.leisure==='miniature_golf') return 'minigolf';
  if(t.leisure==='ice_rink') return 'ice_rink';
  if(t.leisure==='sports_centre') return 'sports';
  if(t.leisure==='escape_room') return 'escape';
  if(t.amenity==='theatre') return 'theatre';
  if(t.amenity==='cinema') return 'cinema';
  if(t.amenity && t.amenity.indexOf('restaurant')>=0) return 'restaurant';
  if(t.historic==='castle') return 'castle';
  if(t.historic==='fort') return 'castle';
  if(t.historic==='windmill' || t.man_made==='windmill') return 'windmill';
  if(t.historic==='monument' || t.historic==='archaeological_site') return 'monument';
  if(t.historic==='ship') return 'ship';
  if(t.historic==='ruins') return 'ruins';
  if(t.natural==='beach') return 'beach';
  return 'other';
}

// ===== Transform data =====
const VENUES = STATIC_NL_VENUES.map(v=>{
  const t = v.tags || {};
  const cat = classify(t);
  return {
    id: v.id, lat: v.lat, lon: v.lon,
    name: t.name || 'Unnamed',
    zh: t.nameZh || '',
    cat: cat,
    emoji: emojiFor(t.name, cat),
    city: t['addr:city'] || '',
    street: t['addr:street'] || '',
    house: t['addr:housenumber'] || '',
    postcode: t['addr:postcode'] || '',
    website: t.website || '',
    hours: t.opening_hours || '',
    rating: parseFloat(t.rating || '0') || null,
    reviews: parseInt(t.reviews || '0') || 0,
  };
});

function saveFavs(){localStorage.setItem(FAV_KEY, JSON.stringify([...state.favs]));}
function toggleFav(){
  if(state.selectedId == null) return;
  if(state.favs.has(state.selectedId)) state.favs.delete(state.selectedId);
  else state.favs.add(state.selectedId);
  saveFavs();
  updateFavBtn();
  renderList();
}
function updateFavBtn(){
  const btn = document.getElementById('ov-fav');
  if(!btn) return;
  const on = state.favs.has(state.selectedId);
  btn.classList.toggle('on', on);
  btn.textContent = on ? '♥' : '♡';
}
function toggleFavsOnly(){
  state.favsOnly = !state.favsOnly;
  document.getElementById('favs-chip').classList.toggle('on', state.favsOnly);
  document.getElementById('favs-chip').style.background = state.favsOnly ? '#fff5f0' : '';
  document.getElementById('favs-chip').style.color = state.favsOnly ? 'var(--brand)' : '';
  document.getElementById('favs-chip').style.borderColor = state.favsOnly ? 'var(--brand)' : '';
  renderList();
}
function cardFavClick(ev, id){
  ev.stopPropagation();
  if(state.favs.has(id)) state.favs.delete(id); else state.favs.add(id);
  saveFavs();
  if(state.selectedId===id) updateFavBtn();
  renderList();
}

    iconSize:[36,36], iconAnchor:[18,18]
  });
}

VENUES.forEach(v=>{
  const m = L.marker([v.lat, v.lon], {icon: makeIcon(v)});
  m.on('click', ()=>openDetail(v));
  clusterGroup.addLayer(m);
  state.markers.set(v.id, m);
});

// ===== Filter + render =====
function computeFiltered(){
  const q = state.search.trim().toLowerCase();
  const bounds = map.getBounds();
  let list = VENUES.filter(v=>{
    if(state.favsOnly && !state.favs.has(v.id)) return false;
    if(state.activeCats.size && !state.activeCats.has(v.cat)) return false;
    if(q && !(v.name.toLowerCase().includes(q) || v.zh.includes(q) || v.city.toLowerCase().includes(q))) return false;
    if(!state.favsOnly && !bounds.contains([v.lat, v.lon])) return false;
    return true;
  });
  if(state.sortBy==='rating'){
    list.sort((a,b)=>(b.rating||0)-(a.rating||0));
  } else if(state.sortBy==='name'){
    list.sort((a,b)=>a.name.localeCompare(b.name));
  }
  state.filtered = list;
  return list;
}

function renderList(){
  const list = computeFiltered();
  const el = document.getElementById('list');
  document.getElementById('count').textContent = list.length;
  if(!list.length){
    el.innerHTML = `<div class="empty">No venues in this area. Try moving the map or clearing filters.</div>`;
    return;
  }
  el.innerHTML = list.slice(0,200).map(v=>{
    const isFav = state.favs.has(v.id);
    // NL venues: original name is already Dutch → use for en & nl; zh uses nameZh
    const primary = state.lang==='zh' && v.zh ? v.zh : v.name;
    const secondary = state.lang==='zh' ? v.name : (v.zh || '');
    const catLabel = CATS[v.cat]?.[state.lang] || v.cat;
    return `
    <div class="venue-card" data-id="${v.id}" onclick="openDetail(VENUES.find(x=>x.id===${v.id}))">
      <div class="venue-thumb cat-${v.cat}">${v.emoji}<button class="card-fav ${isFav?'on':''}" onclick="cardFavClick(event,${v.id})" title="Favorite">${isFav?'♥':'♡'}</button></div>
      <div class="venue-info">
        <div class="venue-name">${primary}</div>
        ${secondary?`<div class="venue-zh">${secondary}</div>`:''}
        <div class="venue-meta">
          ${v.rating?`<span class="rating">★ ${v.rating.toFixed(1)}</span><span class="dot">·</span>`:''}
          <span>${catLabel}</span>
          ${v.city?`<span class="dot">·</span><span>${v.city}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== Detail overlay =====
function openDetail(v){
  if(!v) return;
  state.selectedId = v.id;
  const primary = state.lang==='zh' && v.zh ? v.zh : v.name;
  const secondary = state.lang==='zh' && v.zh ? v.name : v.zh;
  document.getElementById('ov-name').textContent = primary;
  document.getElementById('ov-zh').textContent = secondary;
  const rows = [];
  if(v.rating) rows.push([t('rating'), `★ ${v.rating.toFixed(1)} · ${v.reviews.toLocaleString()} ${t('reviews')}`]);
  if(v.street) rows.push([t('address'), `${v.street} ${v.house}, ${v.postcode} ${v.city}`.trim()]);
  else if(v.city) rows.push([t('city'), v.city]);
  rows.push([t('category'), `${v.emoji} ${CATS[v.cat]?.[state.lang] || v.cat}`]);
  if(v.hours) rows.push([t('hours'), v.hours]);
  document.getElementById('ov-body').innerHTML = rows.map(([k,val])=>
    `<div class="detail-row"><div class="lbl">${k}</div><div>${val}</div></div>`
  ).join('');
  document.getElementById('ov-directions').href = `https://www.google.com/maps/dir/?api=1&destination=${v.lat},${v.lon}&destination_place_id=${encodeURIComponent(v.name)}`;
  document.getElementById('ov-directions').textContent = t('directions');
  document.getElementById('ov-website').textContent = t('website');
  const wsBtn = document.getElementById('ov-website');
  if(v.website){
    wsBtn.href = v.website; wsBtn.style.display='flex';
  } else {
    wsBtn.style.display='none';
  }
  updateFavBtn();
  document.getElementById('overlay').classList.add('open');
  // pan to marker
  map.flyTo([v.lat, v.lon], Math.max(map.getZoom(), 13), {duration:.6});
}
function closeOverlay(){
  document.getElementById('overlay').classList.remove('open');
  state.selectedId = null;
}

// ===== Filter drawer =====
function buildCatGrid(){
  const counts = {};
  VENUES.forEach(v=>counts[v.cat]=(counts[v.cat]||0)+1);
  const el = document.getElementById('cat-grid');
  el.innerHTML = Object.entries(CATS)
    .filter(([k])=>counts[k])
    .sort(([a],[b])=>(counts[b]||0)-(counts[a]||0))
    .map(([k,c])=>`<button class="cat-btn ${state.activeCats.has(k)?'active':''}" data-cat="${k}" onclick="toggleCat('${k}')">
      <span class="emoji">${c.emoji}</span>${c[state.lang]}<span class="count">${counts[k]}</span>
    </button>`).join('');
}
function toggleCat(k){
  if(state.activeCats.has(k)) state.activeCats.delete(k); else state.activeCats.add(k);
  buildCatGrid();
  renderList();
}
function clearFilter(){
  state.activeCats.clear();
  buildCatGrid();
  renderList();
}
function openFilter(){document.getElementById('filter').classList.add('open');}
function closeFilter(){document.getElementById('filter').classList.remove('open');}

// ===== Drawer interactions =====
function toggleDrawer(){
  const d = document.getElementById('drawer');
  const s = d.dataset.state;
  d.dataset.state = s==='peek'?'half':(s==='half'?'full':'peek');
}

// ===== Near me (geolocation) =====
function locateMe(){
  if(!navigator.geolocation) return alert('Geolocation not supported');
  navigator.geolocation.getCurrentPosition(
    (pos)=>{
      const {latitude, longitude} = pos.coords;
      map.flyTo([latitude, longitude], 12, {duration:.8});
      L.circleMarker([latitude, longitude], {radius:10, color:'#c96442', fillColor:'#c96442', fillOpacity:.3, weight:3}).addTo(map);
    },
    (err)=>alert('Could not get location: '+err.message)
  );
}

// ===== Zoom =====
function zoomIn(){map.zoomIn();}
function zoomOut(){map.zoomOut();}

// ===== Search =====
document.getElementById('search').addEventListener('input', e=>{
  state.search = e.target.value;
  renderList();
});

// ===== Country picker (placeholder — links to /) =====
function openCountryPicker(){
  window.location.href = '/';
}

// ===== Map/List view toggle (mobile) =====
function setView(v){
  document.body.dataset.view = v;
  document.getElementById('tog-map').classList.toggle('active', v==='map');
  document.getElementById('tog-list').classList.toggle('active', v==='list');
  if(v==='map'){
    setTimeout(()=>map.invalidateSize(), 50);
  }
}
document.body.dataset.view = 'map';

// ===== Sort toggle =====
function toggleSort(){
  state.sortBy = state.sortBy==='rating'?'name':'rating';
  renderList();
}

// ===== Sync list when map moves =====
let moveTimer;
map.on('moveend', ()=>{
  clearTimeout(moveTimer);
  moveTimer = setTimeout(renderList, 150);
});

// ===== Initial render =====
applyLang();
buildCatGrid();
renderList();

// ===== Click outside to close overlays =====
map.on('click', ()=>{
  closeOverlay();
});
</script>
</body>
</html>
